<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="../styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tauri App</title>
    <script type="module" src="./addFriend.js"></script>
    <script type="module" src="./addFriendDebug.js"></script>
    <script type="module" src="../backButton.js"></script>
  </head>

  <body>
    <main class="container">
      <h1>P2P Voice Call</h1>
        <form class="column" id="signUpForm">
            <input
                type="text"
                id="user"
                placeholder="Enter Friend to add..."
            />
            <div id="search-results" style="margin-top: 8px;"></div>
        </form>

        <input type="text" id="recipientUid" placeholder="Enter recipient UID..." />
        <button id="addTestBtn">Send Test Request</button>

        <!-- <button id="add-test" style="margin-top: 10px;">Add Test Friend</button> -->
      
        <button id="backBtn" style="margin-top: 10px;">Back to Home</button>
      <p id="greet-msg"></p>
    </main>
  </body>
</html>
